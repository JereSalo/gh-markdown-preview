<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Markdown Preview</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown-dark.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d1117;
    color: #c9d1d9;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    flex-shrink: 0;
  }

  header h1 {
    font-size: 14px;
    font-weight: 600;
    color: #c9d1d9;
  }

  .header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .header-actions button {
    background: #21262d;
    color: #c9d1d9;
    border: 1px solid #30363d;
    padding: 4px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
  }

  .header-actions button:hover { background: #30363d; }

  .header-actions .copied {
    background: #238636;
    border-color: #238636;
  }

  .container {
    display: flex;
    flex: 1;
    min-height: 0;
  }

  .pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .pane-header {
    padding: 6px 16px;
    font-size: 12px;
    font-weight: 600;
    color: #8b949e;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }

  .divider {
    width: 1px;
    background: #30363d;
    flex-shrink: 0;
  }

  #editor {
    flex: 1;
    width: 100%;
    background: #0d1117;
    color: #c9d1d9;
    border: none;
    padding: 16px;
    padding-bottom: 50vh;
    font-family: "SF Mono", "Fira Code", "Fira Mono", Menlo, Consolas, monospace;
    font-size: 14px;
    line-height: 1.6;
    resize: none;
    outline: none;
    tab-size: 2;
  }

  #preview {
    flex: 1;
    overflow-y: auto;
    padding: 16px 32px;
  }

  .markdown-body {
    max-width: 900px;
    padding-bottom: 50vh;
  }

  /* GitHub alert styles */
  .markdown-alert {
    padding: 8px 16px;
    margin-bottom: 16px;
    border-left: 4px solid;
    border-radius: 6px;
  }

  .markdown-alert > :first-child { margin-top: 0; }
  .markdown-alert > :last-child { margin-bottom: 0; }

  .markdown-alert .markdown-alert-title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .markdown-alert .markdown-alert-title svg {
    flex-shrink: 0;
  }

  .markdown-alert-note {
    border-left-color: #4493f8;
    background: rgba(68, 147, 248, 0.1);
  }
  .markdown-alert-note .markdown-alert-title { color: #4493f8; }

  .markdown-alert-tip {
    border-left-color: #3fb950;
    background: rgba(63, 185, 80, 0.1);
  }
  .markdown-alert-tip .markdown-alert-title { color: #3fb950; }

  .markdown-alert-important {
    border-left-color: #ab7df8;
    background: rgba(171, 125, 248, 0.1);
  }
  .markdown-alert-important .markdown-alert-title { color: #ab7df8; }

  .markdown-alert-warning {
    border-left-color: #d29922;
    background: rgba(210, 153, 34, 0.1);
  }
  .markdown-alert-warning .markdown-alert-title { color: #d29922; }

  .markdown-alert-caution {
    border-left-color: #f85149;
    background: rgba(248, 81, 73, 0.1);
  }
  .markdown-alert-caution .markdown-alert-title { color: #f85149; }

  /* Task list (checkbox) styles */
  .task-list-list { list-style: none; padding-left: 1.5em; }
  .task-list-item { position: relative; }
  .task-list-item input[type="checkbox"] {
    margin: 0 0.35em 0 -1.5em;
    vertical-align: middle;
    accent-color: #238636;
  }
  .task-list-item label { cursor: pointer; }
</style>
</head>
<body>

<header>
  <h1>GitHub Markdown Preview</h1>
  <div class="header-actions">
    <button id="copyBtn" onclick="copyMarkdown()">Copy Markdown</button>
    <button id="copyHtmlBtn" onclick="copyHtml()">Copy HTML</button>
  </div>
</header>

<div class="container">
  <div class="pane">
    <div class="pane-header">Edit</div>
    <textarea id="editor" spellcheck="true" placeholder="Type GitHub-flavored markdown here..."></textarea>
  </div>
  <div class="divider"></div>
  <div class="pane">
    <div class="pane-header">Preview</div>
    <div id="preview" class="markdown-body"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/markdown-it@14/dist/markdown-it.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/markdown-it-task-lists@2/dist/markdown-it-task-lists.min.js"></script>
<script>
const ALERT_ICONS = {
  note: '<svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8Zm8-6.5a6.5 6.5 0 1 0 0 13 6.5 6.5 0 0 0 0-13ZM6.5 7.75A.75.75 0 0 1 7.25 7h1a.75.75 0 0 1 .75.75v2.75h.25a.75.75 0 0 1 0 1.5h-2a.75.75 0 0 1 0-1.5h.25v-2h-.25a.75.75 0 0 1-.75-.75ZM8 6a1 1 0 1 1 0-2 1 1 0 0 1 0 2Z"/></svg>',
  tip: '<svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1.5c-2.363 0-4 1.69-4 3.75 0 .984.424 1.625.984 2.304l.214.253c.223.264.47.556.673.848.284.411.537.896.621 1.49a.75.75 0 0 1-1.484.211c-.04-.282-.163-.547-.37-.847a8.456 8.456 0 0 0-.542-.68c-.084-.1-.173-.205-.268-.32C3.201 7.75 2.5 6.766 2.5 5.25 2.5 2.31 4.863 0 8 0s5.5 2.31 5.5 5.25c0 1.516-.701 2.5-1.328 3.259-.095.115-.184.22-.268.319-.207.245-.383.453-.541.681-.208.3-.33.565-.37.847a.751.751 0 0 1-1.485-.212c.084-.593.337-1.078.621-1.489.203-.292.45-.584.673-.848.075-.088.147-.173.213-.253.561-.679.985-1.32.985-2.304 0-2.06-1.637-3.75-4-3.75ZM5.75 12h4.5a.75.75 0 0 1 0 1.5h-4.5a.75.75 0 0 1 0-1.5ZM6 15.25a.75.75 0 0 1 .75-.75h2.5a.75.75 0 0 1 0 1.5h-2.5a.75.75 0 0 1-.75-.75Z"/></svg>',
  important: '<svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M0 1.75C0 .784.784 0 1.75 0h12.5C15.216 0 16 .784 16 1.75v9.5A1.75 1.75 0 0 1 14.25 13H8.06l-2.573 2.573A1.458 1.458 0 0 1 3 14.543V13H1.75A1.75 1.75 0 0 1 0 11.25Zm1.75-.25a.25.25 0 0 0-.25.25v9.5c0 .138.112.25.25.25h2a.75.75 0 0 1 .75.75v2.19l2.72-2.72a.749.749 0 0 1 .53-.22h6.5a.25.25 0 0 0 .25-.25v-9.5a.25.25 0 0 0-.25-.25Zm7 2.25v2.5a.75.75 0 0 1-1.5 0v-2.5a.75.75 0 0 1 1.5 0ZM9 9a1 1 0 1 1-2 0 1 1 0 0 1 2 0Z"/></svg>',
  warning: '<svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M6.457 1.047c.659-1.234 2.427-1.234 3.086 0l6.082 11.378A1.75 1.75 0 0 1 14.082 15H1.918a1.75 1.75 0 0 1-1.543-2.575Zm1.763.707a.25.25 0 0 0-.44 0L1.698 13.132a.25.25 0 0 0 .22.368h12.164a.25.25 0 0 0 .22-.368Zm.53 3.996v2.5a.75.75 0 0 1-1.5 0v-2.5a.75.75 0 0 1 1.5 0ZM9 11a1 1 0 1 1-2 0 1 1 0 0 1 2 0Z"/></svg>',
  caution: '<svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M4.47.22A.749.749 0 0 1 5 0h6c.199 0 .389.079.53.22l4.25 4.25c.141.14.22.331.22.53v6a.749.749 0 0 1-.22.53l-4.25 4.25A.749.749 0 0 1 11 16H5a.749.749 0 0 1-.53-.22L.22 11.53A.749.749 0 0 1 0 11V5c0-.199.079-.389.22-.53Zm.84 1.28L1.5 5.31v5.38l3.81 3.81h5.38l3.81-3.81V5.31L10.69 1.5ZM8 4a.75.75 0 0 1 .75.75v3.5a.75.75 0 0 1-1.5 0v-3.5A.75.75 0 0 1 8 4Zm0 8a1 1 0 1 1 0-2 1 1 0 0 1 0 2Z"/></svg>'
};

const ALERT_LABELS = {
  note: 'Note',
  tip: 'Tip',
  important: 'Important',
  warning: 'Warning',
  caution: 'Caution'
};

const md = window.markdownit({
  html: true,
  linkify: true,
  typographer: false,
  breaks: false
}).use(window.markdownitTaskLists, { enabled: true, label: true });

function processAlerts(html) {
  return html.replace(
    /<blockquote>\s*<p>\[!(NOTE|TIP|IMPORTANT|WARNING|CAUTION)\]\s*<br>\s*([\s\S]*?)<\/p>([\s\S]*?)<\/blockquote>/gi,
    function(match, type, firstContent, rest) {
      var key = type.toLowerCase();
      var icon = ALERT_ICONS[key] || '';
      var label = ALERT_LABELS[key] || key;
      var content = '<p>' + firstContent + '</p>' + rest;
      return '<div class="markdown-alert markdown-alert-' + key + '">' +
        '<p class="markdown-alert-title">' + icon + label + '</p>' +
        content + '</div>';
    }
  );
}

function processAlertsParagraph(html) {
  return html.replace(
    /<blockquote>\s*<p>\[!(NOTE|TIP|IMPORTANT|WARNING|CAUTION)\]\n([\s\S]*?)<\/p>([\s\S]*?)<\/blockquote>/gi,
    function(match, type, firstContent, rest) {
      var key = type.toLowerCase();
      var icon = ALERT_ICONS[key] || '';
      var label = ALERT_LABELS[key] || key;
      var content = '<p>' + firstContent + '</p>' + rest;
      return '<div class="markdown-alert markdown-alert-' + key + '">' +
        '<p class="markdown-alert-title">' + icon + label + '</p>' +
        content + '</div>';
    }
  );
}

function render(text) {
  var html = md.render(text);
  html = processAlerts(html);
  html = processAlertsParagraph(html);
  return html;
}

var editor = document.getElementById('editor');
var preview = document.getElementById('preview');
var debounceTimer;

editor.addEventListener('input', function() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(function() {
    preview.innerHTML = render(editor.value);
    // Sync preview scroll to editor after render
    var ratio = editor.scrollTop / (editor.scrollHeight - editor.clientHeight || 1);
    preview.scrollTop = ratio * (preview.scrollHeight - preview.clientHeight);
  }, 50);
});

editor.addEventListener('keydown', function(e) {
  if (e.key === 'Tab') {
    e.preventDefault();
    var start = this.selectionStart;
    var end = this.selectionEnd;
    this.value = this.value.substring(0, start) + '  ' + this.value.substring(end);
    this.selectionStart = this.selectionEnd = start + 2;
    this.dispatchEvent(new Event('input'));
  }
});

// Synchronized scrolling
var syncing = false;

editor.addEventListener('scroll', function() {
  if (syncing) return;
  syncing = true;
  var ratio = editor.scrollTop / (editor.scrollHeight - editor.clientHeight || 1);
  preview.scrollTop = ratio * (preview.scrollHeight - preview.clientHeight);
  syncing = false;
});

preview.addEventListener('scroll', function() {
  if (syncing) return;
  syncing = true;
  var ratio = preview.scrollTop / (preview.scrollHeight - preview.clientHeight || 1);
  editor.scrollTop = ratio * (editor.scrollHeight - editor.clientHeight);
  syncing = false;
});

function copyMarkdown() {
  navigator.clipboard.writeText(editor.value).then(function() {
    flashButton('copyBtn', 'Copied!');
  });
}

function copyHtml() {
  navigator.clipboard.writeText(preview.innerHTML).then(function() {
    flashButton('copyHtmlBtn', 'Copied!');
  });
}

function flashButton(id, text) {
  var btn = document.getElementById(id);
  var original = btn.textContent;
  btn.textContent = text;
  btn.classList.add('copied');
  setTimeout(function() {
    btn.textContent = original;
    btn.classList.remove('copied');
  }, 1500);
}

// Load content from URL hash (works over https://)
// Also supports INITIAL_CONTENT variable (injected by gh-preview.sh for local use)
function loadInitialContent() {
  if (typeof INITIAL_CONTENT === 'string' && INITIAL_CONTENT) {
    editor.value = INITIAL_CONTENT;
  } else if (window.location.hash.length > 1) {
    try {
      editor.value = decodeURIComponent(window.location.hash.substring(1));
    } catch(e) {}
  }
  if (editor.value) {
    preview.innerHTML = render(editor.value);
  }
}

loadInitialContent();
editor.focus();
</script>
</body>
</html>
